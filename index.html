<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mara's Goblin Lab</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#07080d;color:#f7f2ff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;padding:12px}
.app{max-width:1000px;margin:auto}
h1{margin:0 0 4px;font-size:30px;color:#ff4fc3;text-shadow:0 0 12px #ff4fc3}
.sub{color:#7dff6b;margin-bottom:12px}
.panel{background:#10131d;border:1px solid #2c3150;border-radius:16px;padding:10px;margin-bottom:12px;box-shadow:0 0 18px #000}
.top{display:grid;grid-template-columns:1fr 1fr;gap:8px}
button,select,input{font:inherit}
button{border:0;border-radius:10px;background:#202641;color:#fff;font-weight:800;min-height:42px}
button:active{transform:scale(.97)}
.play{background:#7dff6b;color:#071000;font-size:20px}
.rec{background:#ff4f8b}
.hot{background:#8b5cff}
.row{display:grid;grid-template-columns:82px 38px 38px 54px repeat(16,1fr);gap:5px;align-items:center;margin:6px 0}
.label{font-weight:900;font-size:13px}
.mini{min-height:34px;font-size:13px}
.knob{width:54px}
.step{height:34px;min-height:34px;border-radius:7px;background:#1d2234;border:1px solid #343b59}
.step.on{box-shadow:0 0 12px currentColor;background:currentColor}
.step.playhead{outline:2px solid #fff;outline-offset:1px}
.kick{color:#ff4f8b}.snare{color:#42a5ff}.clap{color:#bb63ff}.hat{color:#7dff6b}
.openhat{color:#ffe34f}.perc{color:#ff9b32}.bass{color:#24f0d1}.lead{color:#ff4fc3}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.box{background:#090b12;border:1px solid #242943;border-radius:12px;padding:10px}
label{display:flex;justify-content:space-between;color:#aeb7d8;font-weight:800;margin-bottom:6px}
input[type=range]{width:100%}
.patterns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.active{background:#7dff6b!important;color:#071000!important}
.note{color:#aeb7d8;font-size:13px;line-height:1.35}
@media(max-width:760px){
.row{grid-template-columns:74px 34px 34px 44px repeat(16,1fr);gap:3px}
.label{font-size:11px}.step{height:28px;min-height:28px}.mini{min-height:30px;padding:0}
}
</style>
</head>
<body>
<div class="app">
<h1>☠️ Mara's Goblin Lab</h1>
<div class="sub">Cyber synth goblin step machine v0.1</div>

<div class="panel top">
<button id="play" class="play" onclick="togglePlay()">▶ PLAY</button>
<button class="rec" onclick="randomBeat()">RANDOM GOBLIN</button>
<button onclick="clearPattern()">CLEAR</button>
<button class="hot" onclick="classicBeat()">STARTER BEAT</button>
</div>

<div class="panel">
<div id="rack"></div>
</div>

<div class="panel controls">
<div class="box">
<label><span>BPM</span><strong id="bpmVal">128</strong></label>
<input id="bpm" type="range" min="60" max="220" value="128" oninput="bpmVal.textContent=this.value; restartClock()">
</div>
<div class="box">
<label><span>Swing</span><strong id="swingVal">20%</strong></label>
<input id="swing" type="range" min="0" max="65" value="20" oninput="swingVal.textContent=this.value+'%'">
</div>
<div class="box">
<label><span>Master Volume</span><strong id="volVal">80%</strong></label>
<input id="master" type="range" min="0" max="100" value="80" oninput="volVal.textContent=this.value+'%'">
</div>
<div class="box">
<label><span>Wave</span><strong></strong></label>
<select id="wave"><option>sawtooth</option><option>square</option><option>triangle</option><option>sine</option></select>
</div>
</div>

<div class="panel">
<label><span>Patterns</span><span>A-D</span></label>
<div class="patterns">
<button id="pat0" class="active" onclick="setPattern(0)">A</button>
<button id="pat1" onclick="setPattern(1)">B</button>
<button id="pat2" onclick="setPattern(2)">C</button>
<button id="pat3" onclick="setPattern(3)">D</button>
</div>
</div>

<p class="note">Rows: Kick, Snare, Clap, Closed Hat, Open Hat, Perc, Bass, Lead. S = solo, M = mute. Sliders are row volume. It uses synthesized drums, no sample files needed.</p>
</div>

<script>
const STEPS=16;
const tracks=[
{name:"KICK",cls:"kick",type:"kick",vol:.9,mute:false,solo:false},
{name:"SNARE",cls:"snare",type:"snare",vol:.7,mute:false,solo:false},
{name:"CLAP",cls:"clap",type:"clap",vol:.65,mute:false,solo:false},
{name:"C HAT",cls:"hat",type:"hat",vol:.45,mute:false,solo:false},
{name:"O HAT",cls:"openhat",type:"openhat",vol:.45,mute:false,solo:false},
{name:"PERC",cls:"perc",type:"perc",vol:.55,mute:false,solo:false},
{name:"BASS",cls:"bass",type:"bass",vol:.6,mute:false,solo:false},
{name:"LEAD",cls:"lead",type:"lead",vol:.45,mute:false,solo:false}
];

let audio=null, masterGain=null, playing=false, step=0, timer=null, currentPattern=0;
let patterns=Array.from({length:4},()=>Array.from({length:tracks.length},()=>Array(STEPS).fill(false)));

function initAudio(){
 if(!audio){
  audio=new (window.AudioContext||window.webkitAudioContext)();
  masterGain=audio.createGain();
  masterGain.connect(audio.destination);
 }
 if(audio.state==="suspended")audio.resume();
 masterGain.gain.value=Number(master.value)/100;
}

function build(){
 const rack=document.getElementById("rack");
 rack.innerHTML="";
 tracks.forEach((t,r)=>{
  const row=document.createElement("div");
  row.className="row";
  row.innerHTML=`<div class="label ${t.cls}">${t.name}</div>
  <button class="mini" onclick="solo(${r})">S</button>
  <button class="mini" onclick="mute(${r})">M</button>
  <input class="knob" type="range" min="0" max="100" value="${t.vol*100}" oninput="tracks[${r}].vol=this.value/100">`;
  for(let c=0;c<STEPS;c++){
   const b=document.createElement("button");
   b.className="step "+t.cls;
   b.onclick=()=>tap(r,c);
   b.dataset.r=r;b.dataset.c=c;
   row.appendChild(b);
  }
  rack.appendChild(row);
 });
 refresh();
}

function cell(r,c){return document.querySelector(`[data-r="${r}"][data-c="${c}"]`)}
function tap(r,c){initAudio();patterns[currentPattern][r][c]=!patterns[currentPattern][r][c];refresh(); if(patterns[currentPattern][r][c]) playTrack(r)}
function refresh(){
 tracks.forEach((t,r)=>{for(let c=0;c<STEPS;c++){cell(r,c)?.classList.toggle("on",patterns[currentPattern][r][c]);cell(r,c)?.classList.toggle("playhead",playing&&c===step)}})
 for(let i=0;i<4;i++)document.getElementById("pat"+i).classList.toggle("active",i===currentPattern);
}

function shouldPlay(r){
 const anySolo=tracks.some(t=>t.solo);
 if(tracks[r].mute)return false;
 if(anySolo&&!tracks[r].solo)return false;
 return true;
}
function mute(r){tracks[r].mute=!tracks[r].mute}
function solo(r){tracks[r].solo=!tracks[r].solo}

function osc(freq,type,dur,vol,slide){
 const t=audio.currentTime;
 const o=audio.createOscillator(), g=audio.createGain();
 o.type=type;o.frequency.setValueAtTime(freq,t);
 if(slide)o.frequency.exponentialRampToValueAtTime(slide,t+dur*.8);
 g.gain.setValueAtTime(.001,t);
 g.gain.exponentialRampToValueAtTime(vol,t+.01);
 g.gain.exponentialRampToValueAtTime(.001,t+dur);
 o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+dur+.02);
}

function noise(dur,vol,filterFreq){
 const t=audio.currentTime;
 const buffer=audio.createBuffer(1,audio.sampleRate*dur,audio.sampleRate);
 const data=buffer.getChannelData(0);
 for(let i=0;i<data.length;i++)data[i]=Math.random()*2-1;
 const src=audio.createBufferSource();src.buffer=buffer;
 const f=audio.createBiquadFilter();f.type="highpass";f.frequency.value=filterFreq;
 const g=audio.createGain();
 g.gain.setValueAtTime(.001,t);g.gain.exponentialRampToValueAtTime(vol,t+.005);g.gain.exponentialRampToValueAtTime(.001,t+dur);
 src.connect(f);f.connect(g);g.connect(masterGain);src.start(t);src.stop(t+dur);
}

function playTrack(r){
 if(!shouldPlay(r))return;
 const v=tracks[r].vol*(Number(master.value)/100);
 const type=tracks[r].type;
 if(type==="kick")osc(130,"sine",.35,v*.9,45);
 if(type==="snare"){noise(.16,v*.55,900);osc(190,"triangle",.12,v*.2,120)}
 if(type==="clap"){noise(.08,v*.35,1200);setTimeout(()=>noise(.08,v*.3,1200),35);setTimeout(()=>noise(.12,v*.25,1200),70)}
 if(type==="hat")noise(.045,v*.38,6500);
 if(type==="openhat")noise(.22,v*.32,5000);
 if(type==="perc")osc(420,"square",.09,v*.35,260);
 if(type==="bass")osc(55,document.getElementById("wave").value,.22,v*.55,48);
 if(type==="lead")osc(440+step*12,document.getElementById("wave").value,.16,v*.35,null);
}

function tick(){
 initAudio();
 tracks.forEach((t,r)=>{if(patterns[currentPattern][r][step])playTrack(r)});
 refresh();
 const old=step;
 step=(step+1)%STEPS;
 let base=(60000/Number(bpm.value))/4;
 let sw=Number(swing.value)/100;
 let delay=(old%2===0)?base*(1+sw):base*(1-sw);
 clearTimeout(timer);
 timer=setTimeout(tick,delay);
}

function togglePlay(){
 initAudio();
 playing=!playing;
 document.getElementById("play").textContent=playing?"■ STOP":"▶ PLAY";
 if(playing){step=0;tick()}else{clearTimeout(timer);refresh()}
}
function restartClock(){if(playing){clearTimeout(timer);timer=setTimeout(tick,1)}}
function setPattern(i){currentPattern=i;step=0;refresh()}
function clearPattern(){patterns[currentPattern]=Array.from({length:tracks.length},()=>Array(STEPS).fill(false));refresh()}
function randomBeat(){
 patterns[currentPattern].forEach((row,r)=>row.forEach((_,c)=>patterns[currentPattern][r][c]=Math.random()<(r<6?.18:.13)));
 refresh();
}
function classicBeat(){
 clearPattern();
 [0,4,8,12].forEach(c=>patterns[currentPattern][0][c]=true);
 [4,12].forEach(c=>patterns[currentPattern][1][c]=true);
 for(let c=0;c<16;c+=2)patterns[currentPattern][3][c]=true;
 [6,14].forEach(c=>patterns[currentPattern][4][c]=true);
 [1,7,10,15].forEach(c=>patterns[currentPattern][5][c]=true);
 [0,3,6,10,13].forEach(c=>patterns[currentPattern][6][c]=true);
 [2,5,8,11,14].forEach(c=>patterns[currentPattern][7][c]=true);
 refresh();
}
build();
classicBeat();
</script>
</body>
</html>
